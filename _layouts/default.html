<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Prevent dark mode flash: apply theme before CSS renders -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
  {% include head.html %}
</head>
<body>
  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Google Translate (loads async; may be blocked in some regions) -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'zh-CN,fr,ja,ko,de,es,pt,ar',
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script async src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script>
    // Dark mode toggle
    (function() {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();

    // Translation dropdown
    (function() {
      var toggleBtn  = document.getElementById('translateBtn');
      var dropdown   = document.getElementById('translateDropdown');
      var currentLbl = document.getElementById('currentLang');
      var wrap       = document.getElementById('translateWrap');
      if (!toggleBtn || !dropdown) return;

      // Detect if Google Translate widget loaded (fails when blocked)
      var googleReady = false;
      var gtCheckTimer = setInterval(function() {
        if (document.querySelector('#google_translate_element select')) {
          googleReady = true;
          clearInterval(gtCheckTimer);
        }
      }, 200);
      setTimeout(function() { clearInterval(gtCheckTimer); }, 5000);

      // Fallback URLs for when Google is blocked
      var baiduLangs = { 'zh-CN': 'zh' };
      var fallbackUrl = function(lang) {
        var pageUrl = encodeURIComponent(window.location.href);
        if (baiduLangs[lang]) {
          // Use Baidu for Chinese
          return 'https://fanyi.baidu.com/transpage?source=url&ie=utf8&from=auto&to='
                 + baiduLangs[lang] + '&render=1&url=' + pageUrl;
        }
        // Use Google Translate framed URL for others
        return 'https://translate.google.com/translate?sl=auto&tl=' + lang + '&u=' + pageUrl;
      };

      function applyTranslation(lang) {
        if (lang === 'en') {
          // Clear Google Translate cookies and reload to restore original
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=' + window.location.hostname + '; path=/';
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=.' + window.location.hostname + '; path=/';
          window.location.reload();
          return;
        }

        if (googleReady) {
          var select = document.querySelector('#google_translate_element select');
          if (select) {
            select.value = lang;
            select.dispatchEvent(new Event('change'));
            return;
          }
        }
        // Google not available — open fallback in new tab
        window.open(fallbackUrl(lang), '_blank');
      }

      // Toggle dropdown
      toggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = dropdown.classList.toggle('open');
        toggleBtn.setAttribute('aria-expanded', open);
      });

      // Close on outside click
      document.addEventListener('click', function(e) {
        if (!wrap.contains(e.target)) {
          dropdown.classList.remove('open');
          toggleBtn.setAttribute('aria-expanded', 'false');
        }
      });

      // Option click
      dropdown.querySelectorAll('.translate-option').forEach(function(opt) {
        opt.addEventListener('click', function() {
          var lang  = opt.getAttribute('data-lang');
          var label = opt.getAttribute('data-label');

          // Update active state
          dropdown.querySelectorAll('.translate-option').forEach(function(o) {
            o.classList.remove('active');
          });
          opt.classList.add('active');
          currentLbl.textContent = label;

          dropdown.classList.remove('open');
          toggleBtn.setAttribute('aria-expanded', 'false');
          applyTranslation(lang);
        });
      });
    })();

    // Code block enhancements: language label + copy button
    (function() {
      document.querySelectorAll('.post-content pre').forEach(function(pre) {
        var code = pre.querySelector('code');
        var langClass = code ? [...code.classList].find(function(c) { return c.startsWith('language-'); }) : null;
        var lang = langClass ? langClass.replace('language-', '') : '';

        var wrapper = document.createElement('div');
        wrapper.className = 'code-block-wrapper';
        if (lang) wrapper.setAttribute('data-lang', lang);
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);

        if (lang && lang !== 'plaintext') {
          var label = document.createElement('span');
          label.className = 'code-lang';
          label.textContent = lang;
          wrapper.appendChild(label);
        }

        if (navigator.clipboard) {
          var copyBtn = document.createElement('button');
          copyBtn.className = 'code-copy';
          copyBtn.textContent = 'Copy';
          wrapper.appendChild(copyBtn);
          copyBtn.addEventListener('click', function() {
            var text = code ? code.innerText : pre.innerText;
            navigator.clipboard.writeText(text).then(function() {
              copyBtn.textContent = 'Copied!';
              copyBtn.classList.add('copied');
              setTimeout(function() {
                copyBtn.textContent = 'Copy';
                copyBtn.classList.remove('copied');
              }, 2000);
            });
          });
        }
      });
    })();
  </script>
</body>
</html>
