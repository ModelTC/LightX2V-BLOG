<header class="site-header">
  <div class="container">
    <div class="site-header__inner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/about' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>About</a>

        <div class="translate-wrap" id="translateWrap">
          <button class="translate-btn" id="translateBtn" aria-label="Translate page" aria-expanded="false">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/>
              <path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/>
            </svg>
            <span id="currentLang">EN</span>
            <svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div class="translate-dropdown" id="translateDropdown" role="listbox">
            <button class="translate-option active" data-lang="en"   data-label="EN">🇺🇸 English</button>
            <button class="translate-option"        data-lang="zh-CN" data-label="中文">🇨🇳 中文简体</button>
            <button class="translate-option"        data-lang="fr"   data-label="FR">🇫🇷 Français</button>
            <button class="translate-option"        data-lang="ja"   data-label="日本語">🇯🇵 日本語</button>
            <button class="translate-option"        data-lang="ko"   data-label="KO">🇰🇷 한국어</button>
            <button class="translate-option"        data-lang="de"   data-label="DE">🇩🇪 Deutsch</button>
            <button class="translate-option"        data-lang="es"   data-label="ES">🇪🇸 Español</button>
            <button class="translate-option"        data-lang="pt"   data-label="PT">🇧🇷 Português</button>
            <button class="translate-option"        data-lang="ar"   data-label="AR">🇸🇦 العربية</button>
          </div>
          <div id="google_translate_element" style="display:none"></div>
        </div>

        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </nav>
    </div>
  </div>
</header>
