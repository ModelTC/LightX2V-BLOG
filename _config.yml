title: "My Blog"
description: "thoughts, notes, and things I find interesting"
author:
  name: "Your Name"
  email: "you@example.com"
  bio: "Writer, thinker, builder."

url: ""  # 部署后填入: https://yourusername.github.io
baseurl: ""  # 如果仓库名不是 username.github.io，填入: /my-blog

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: /posts/:year/:month/:day/:title/

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 分页（可选）
paginate: 10
paginate_path: "/page/:num/"

# 排除不需要构建的文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor/

# 时区
timezone: Asia/Shanghai

# 默认 front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Your Name"
