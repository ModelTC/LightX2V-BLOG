title: "LightX2V Blog"
description: "thoughts, notes, and things I find interesting"
author:
  name: "LightX2V"
  email: "lightx2v2025@163.com"
  bio: "Writer, thinker, builder."

url: "https://light-ai.top"
baseurl: "/LightX2V-BLOG"

# 构建设置
markdown: kramdown
highlighter: rouge
kramdown:
  math_engine: mathjax

# Collections
collections:
  articles:
    output: true
    permalink: /posts/:title/

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 排除不需要构建的文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor/

# 时区
timezone: Asia/Shanghai

# 默认 front matter
defaults:
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "post"
