<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Prevent dark mode flash: apply theme before CSS renders -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
  {% include head.html %}
</head>
<body>
  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Google Translate only -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'zh-CN,fr,ja,ko,de,es,pt,ar',
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script async src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script>
    // ── Dark mode ──────────────────────────────────────────────
    (function() {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();

    // ── Translation (Google only) ────────────────────────────
    (function() {
      var toggleBtn  = document.getElementById('translateBtn');
      var dropdown   = document.getElementById('translateDropdown');
      var currentLbl = document.getElementById('currentLang');
      var wrap       = document.getElementById('translateWrap');
      if (!toggleBtn || !dropdown) return;

      function getGoogleSelect() {
        return document.querySelector('#google_translate_element select');
      }

      function showGoogleUnavailableTip() {
        if (document.getElementById('translateBlockedOverlay')) return;
        var overlay = document.createElement('div');
        overlay.id = 'translateBlockedOverlay';
        overlay.className = 'translate-blocked-overlay';
        overlay.setAttribute('role', 'dialog');
        overlay.innerHTML = `
          <div class="translate-blocked-card">
            <h3>无法使用 Google 翻译</h3>
            <p>当前页面无法加载 Google 翻译服务。若您位于<strong>中国大陆</strong>等无法访问 Google 的地区，会出现此情况。</p>
            <p>您可以尝试：</p>
            <ul>
              <li>安装浏览器翻译扩展，例如<strong>沉浸式翻译</strong>等</li>
              <li>使用您浏览器自带的全文翻译功能</li>
            </ul>
            <button type="button" class="translate-blocked-close">知道了</button>
          </div>
        `;
        document.body.appendChild(overlay);
        function close() {
          overlay.remove();
          document.removeEventListener('keydown', onKey);
        }
        function onKey(e) {
          if (e.key === 'Escape') close();
        }
        document.addEventListener('keydown', onKey);
        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) close();
        });
        overlay.querySelector('.translate-blocked-close').addEventListener('click', close);
      }

      function resetToEnglishUI() {
        dropdown.querySelectorAll('.translate-option').forEach(function(o) {
          o.classList.toggle('active', o.getAttribute('data-lang') === 'en');
        });
        currentLbl.textContent = 'EN';
      }

      function applyTranslation(lang) {
        if (lang === 'en') {
          ['', location.hostname, '.' + location.hostname].forEach(function(d) {
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/' + (d ? '; domain=' + d : '');
          });
          location.reload();
          return;
        }

        function tryGoogle() {
          var sel = getGoogleSelect();
          if (!sel) return false;
          sel.value = lang;
          sel.dispatchEvent(new Event('change'));
          return true;
        }

        if (tryGoogle()) return;

        var n = 0;
        var t = setInterval(function() {
          n++;
          if (tryGoogle()) {
            clearInterval(t);
            return;
          }
          if (n >= 25) {
            clearInterval(t);
            resetToEnglishUI();
            showGoogleUnavailableTip();
          }
        }, 200);
      }

      toggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = dropdown.classList.toggle('open');
        toggleBtn.setAttribute('aria-expanded', open);
      });

      document.addEventListener('click', function(e) {
        if (!wrap.contains(e.target)) {
          dropdown.classList.remove('open');
          toggleBtn.setAttribute('aria-expanded', 'false');
        }
      });

      dropdown.querySelectorAll('.translate-option').forEach(function(opt) {
        opt.addEventListener('click', function() {
          var lang  = opt.getAttribute('data-lang');
          var label = opt.getAttribute('data-label');
          dropdown.querySelectorAll('.translate-option').forEach(function(o) { o.classList.remove('active'); });
          opt.classList.add('active');
          currentLbl.textContent = label;
          dropdown.classList.remove('open');
          toggleBtn.setAttribute('aria-expanded', 'false');
          applyTranslation(lang);
        });
      });
    })();

    // ── Code block: language label + copy button ───────────────
    (function() {
      document.querySelectorAll('.post-content pre').forEach(function(pre) {
        var code = pre.querySelector('code');
        var langClass = code ? Array.prototype.slice.call(code.classList).find(function(c) { return c.startsWith('language-'); }) : null;
        var lang = langClass ? langClass.replace('language-', '') : '';

        var wrapper = document.createElement('div');
        wrapper.className = 'code-block-wrapper';
        if (lang) wrapper.setAttribute('data-lang', lang);
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);

        if (lang && lang !== 'plaintext') {
          var label = document.createElement('span');
          label.className = 'code-lang';
          label.textContent = lang;
          wrapper.appendChild(label);
        }

        if (navigator.clipboard) {
          var copyBtn = document.createElement('button');
          copyBtn.className = 'code-copy';
          copyBtn.textContent = 'Copy';
          wrapper.appendChild(copyBtn);
          copyBtn.addEventListener('click', function() {
            navigator.clipboard.writeText(code ? code.innerText : pre.innerText).then(function() {
              copyBtn.textContent = 'Copied!';
              copyBtn.classList.add('copied');
              setTimeout(function() { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
            });
          });
        }
      });
    })();
  </script>
</body>
</html>
