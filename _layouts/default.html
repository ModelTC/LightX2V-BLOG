<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Prevent dark mode flash: apply theme before CSS renders -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
  {% include head.html %}
</head>
<body>
  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Google Translate Widget (works outside China) -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'zh-CN,fr,ja,ko,de,es,pt,ar',
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script async src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <!-- Baidu Translate Widget (works in China) -->
  <script>
    window.baiduTranslateConfig = {
      delay: 0,
      translateElement: 'baidu_translate_element'
    };
  </script>
  <script async src="https://fanyi-cdn.cdn.bcebos.com/webStatic/translation/js/index.js"></script>

  <script>
    // ── Dark mode ──────────────────────────────────────────────
    (function() {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();

    // ── Translation ────────────────────────────────────────────
    (function() {
      var toggleBtn  = document.getElementById('translateBtn');
      var dropdown   = document.getElementById('translateDropdown');
      var currentLbl = document.getElementById('currentLang');
      var wrap       = document.getElementById('translateWrap');
      if (!toggleBtn || !dropdown) return;

      // MyMemory language codes
      var mmLang = {
        'zh-CN': 'zh-CN', 'fr': 'fr', 'ja': 'ja', 'ko': 'ko',
        'de':    'de',     'es': 'es', 'pt': 'pt', 'ar': 'ar'
      };

      // ── MyMemory in-page translation (free, no key, global) ──
      var originalHTML  = null;
      var translating   = false;

      function mmFetch(text, lang) {
        var pair = 'en%7C' + (mmLang[lang] || lang);
        return fetch('https://api.mymemory.translated.world/get?q='
            + encodeURIComponent(text.slice(0, 480)) + '&langpair=' + pair)
          .then(function(r) { return r.json(); })
          .then(function(d) { return d.responseStatus === 200 ? d.responseData.translatedText : text; })
          .catch(function() { return text; });
      }

      function translateInPage(lang) {
        if (translating) return;
        var content = document.querySelector('.post-content');
        if (!content) return;

        // Save original once
        if (!originalHTML) originalHTML = content.innerHTML;

        // Check cache
        var key = 'tr_' + lang + '_' + location.pathname;
        var cached = sessionStorage.getItem(key);
        if (cached) { content.innerHTML = cached; return; }

        // Collect text elements, skip code/math
        var els = Array.prototype.slice.call(
          content.querySelectorAll('p, h2, h3, h4, li, blockquote p, td, th')
        ).filter(function(el) {
          return !el.closest('pre') && !el.closest('.MathJax')
              && !el.closest('[class*="highlight"]') && el.textContent.trim().length > 3;
        });

        translating = true;
        toggleBtn.disabled = true;
        toggleBtn.style.opacity = '0.5';

        var i = 0;
        function next() {
          if (i >= els.length) {
            sessionStorage.setItem(key, content.innerHTML);
            translating = false;
            toggleBtn.disabled = false;
            toggleBtn.style.opacity = '';
            return;
          }
          var el = els[i++];
          var orig = el.textContent.trim();
          mmFetch(orig, lang).then(function(translated) {
            if (translated && translated !== orig) el.textContent = translated;
            next();
          });
        }
        next();
      }

      // Baidu language codes (differ from standard)
      var baiduLang = {
        'zh-CN': 'zh',  'fr': 'fra', 'ja': 'jp',
        'ko':    'kor',  'de': 'de',  'es': 'spa',
        'pt':    'pt',   'ar': 'ara'
      };

      // ── Apply translation ────────────────────────────────────
      function applyTranslation(lang) {
        if (lang === 'en') {
          // Restore MyMemory translation if active
          var content = document.querySelector('.post-content');
          if (content && originalHTML) {
            content.innerHTML = originalHTML;
            originalHTML = null;
            return;
          }
          // Clear Google Translate cookies and reload to restore original
          ['', location.hostname, '.' + location.hostname].forEach(function(d) {
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/' + (d ? '; domain=' + d : '');
          });
          location.reload();
          return;
        }

        // 1st: Try Google Translate widget (works outside China)
        var gSelect = document.querySelector('#google_translate_element select');
        if (gSelect) {
          gSelect.value = lang;
          gSelect.dispatchEvent(new Event('change'));
          return;
        }

        // 2nd: Try Baidu Translate widget (works in China)
        var bSelect = document.querySelector('#baidu_translate_element select');
        if (bSelect) {
          bSelect.value = baiduLang[lang] || lang;
          bSelect.dispatchEvent(new Event('change'));
          return;
        }

        // 3rd: MyMemory in-page translation (final fallback)
        translateInPage(lang);
      }

      // ── Dropdown UI ──────────────────────────────────────────
      toggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = dropdown.classList.toggle('open');
        toggleBtn.setAttribute('aria-expanded', open);
      });

      document.addEventListener('click', function(e) {
        if (!wrap.contains(e.target)) {
          dropdown.classList.remove('open');
          toggleBtn.setAttribute('aria-expanded', 'false');
        }
      });

      dropdown.querySelectorAll('.translate-option').forEach(function(opt) {
        opt.addEventListener('click', function() {
          var lang  = opt.getAttribute('data-lang');
          var label = opt.getAttribute('data-label');
          dropdown.querySelectorAll('.translate-option').forEach(function(o) { o.classList.remove('active'); });
          opt.classList.add('active');
          currentLbl.textContent = label;
          dropdown.classList.remove('open');
          toggleBtn.setAttribute('aria-expanded', 'false');
          applyTranslation(lang);
        });
      });
    })();

    // ── Code block: language label + copy button ───────────────
    (function() {
      document.querySelectorAll('.post-content pre').forEach(function(pre) {
        var code = pre.querySelector('code');
        var langClass = code ? Array.prototype.slice.call(code.classList).find(function(c) { return c.startsWith('language-'); }) : null;
        var lang = langClass ? langClass.replace('language-', '') : '';

        var wrapper = document.createElement('div');
        wrapper.className = 'code-block-wrapper';
        if (lang) wrapper.setAttribute('data-lang', lang);
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);

        if (lang && lang !== 'plaintext') {
          var label = document.createElement('span');
          label.className = 'code-lang';
          label.textContent = lang;
          wrapper.appendChild(label);
        }

        if (navigator.clipboard) {
          var copyBtn = document.createElement('button');
          copyBtn.className = 'code-copy';
          copyBtn.textContent = 'Copy';
          wrapper.appendChild(copyBtn);
          copyBtn.addEventListener('click', function() {
            navigator.clipboard.writeText(code ? code.innerText : pre.innerText).then(function() {
              copyBtn.textContent = 'Copied!';
              copyBtn.classList.add('copied');
              setTimeout(function() { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
            });
          });
        }
      });
    })();
  </script>
</body>
</html>
