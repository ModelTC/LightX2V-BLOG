<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Prevent dark mode flash: apply theme before CSS renders -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
  {% include head.html %}
</head>
<body>
  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Microsoft Translator Widget -->
  <script>
    setTimeout(function() {
      var s = document.createElement('script');
      s.src = 'https://www.bing.com/translator/static/ext/widget/v1/widget.js';
      s.async = true;
      document.body.appendChild(s);
    }, 0);
  </script>

  <script>
    // Dark mode toggle
    (function() {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();

    // Translation dropdown
    (function() {
      var toggleBtn  = document.getElementById('translateBtn');
      var dropdown   = document.getElementById('translateDropdown');
      var currentLbl = document.getElementById('currentLang');
      var wrap       = document.getElementById('translateWrap');
      if (!toggleBtn || !dropdown) return;

      // Microsoft Translator language code mapping
      var msLangMap = {
        'zh-CN': 'zh-Hans',
        'fr':    'fr',
        'ja':    'ja',
        'ko':    'ko',
        'de':    'de',
        'es':    'es',
        'pt':    'pt',
        'ar':    'ar'
      };

      // Detect when Microsoft Translator widget has loaded
      var msReady = false;
      var msCheckTimer = setInterval(function() {
        if (document.querySelector('#MicrosoftTranslatorWidget select')) {
          msReady = true;
          clearInterval(msCheckTimer);
        }
      }, 200);
      setTimeout(function() { clearInterval(msCheckTimer); }, 6000);

      function applyTranslation(lang) {
        if (lang === 'en') {
          window.location.reload();
          return;
        }

        var msLang = msLangMap[lang] || lang;

        if (msReady) {
          var select = document.querySelector('#MicrosoftTranslatorWidget select');
          if (select) {
            select.value = msLang;
            select.dispatchEvent(new Event('change'));
            return;
          }
        }
        // Fallback: open Microsoft Translator full-page translation in new tab
        var pageUrl = encodeURIComponent(window.location.href);
        window.open('https://www.translatetheweb.com/?from=en&to=' + msLang + '&a=' + pageUrl, '_blank');
      }

      // Toggle dropdown
      toggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = dropdown.classList.toggle('open');
        toggleBtn.setAttribute('aria-expanded', open);
      });

      // Close on outside click
      document.addEventListener('click', function(e) {
        if (!wrap.contains(e.target)) {
          dropdown.classList.remove('open');
          toggleBtn.setAttribute('aria-expanded', 'false');
        }
      });

      // Option click
      dropdown.querySelectorAll('.translate-option').forEach(function(opt) {
        opt.addEventListener('click', function() {
          var lang  = opt.getAttribute('data-lang');
          var label = opt.getAttribute('data-label');

          // Update active state
          dropdown.querySelectorAll('.translate-option').forEach(function(o) {
            o.classList.remove('active');
          });
          opt.classList.add('active');
          currentLbl.textContent = label;

          dropdown.classList.remove('open');
          toggleBtn.setAttribute('aria-expanded', 'false');
          applyTranslation(lang);
        });
      });
    })();

    // Code block enhancements: language label + copy button
    (function() {
      document.querySelectorAll('.post-content pre').forEach(function(pre) {
        var code = pre.querySelector('code');
        var langClass = code ? [...code.classList].find(function(c) { return c.startsWith('language-'); }) : null;
        var lang = langClass ? langClass.replace('language-', '') : '';

        var wrapper = document.createElement('div');
        wrapper.className = 'code-block-wrapper';
        if (lang) wrapper.setAttribute('data-lang', lang);
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);

        if (lang && lang !== 'plaintext') {
          var label = document.createElement('span');
          label.className = 'code-lang';
          label.textContent = lang;
          wrapper.appendChild(label);
        }

        if (navigator.clipboard) {
          var copyBtn = document.createElement('button');
          copyBtn.className = 'code-copy';
          copyBtn.textContent = 'Copy';
          wrapper.appendChild(copyBtn);
          copyBtn.addEventListener('click', function() {
            var text = code ? code.innerText : pre.innerText;
            navigator.clipboard.writeText(text).then(function() {
              copyBtn.textContent = 'Copied!';
              copyBtn.classList.add('copied');
              setTimeout(function() {
                copyBtn.textContent = 'Copy';
                copyBtn.classList.remove('copied');
              }, 2000);
            });
          });
        }
      });
    })();
  </script>
</body>
</html>
